---
layout: default
---
<div class="doc-layout">
  <script>
    (function () {
      try {
        var p = document.currentScript && document.currentScript.parentElement;
        if (p && localStorage.getItem('renthub-sidebar-collapsed') === '1') {
          p.classList.add('sidebar-collapsed');
        }
      } catch (e) {}
    })();
  </script>
  {% include sidebar.html %}
  <div class="doc-content-wrap">
    <article class="doc-content">
      <h1 class="doc-title">{{ page.title }}</h1>
      {{ content }}
    </article>
    {% include footer.html %}
  </div>
</div>
