title: RentHub 开发者指南
description: RentHub 团队开发者参考手册
url: https://docs.renthub.cloud
baseurl: /renthub-developer-guide

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

defaults:
  - scope:
      path: "docs"
    values:
      layout: doc

include:
  - docs

exclude:
  - README.md
  - Gemfile.lock
  - node_modules
  - vendor
  - .cursor
  - .github
  - "*.py"
  - __pycache__

collections_dir: .

plugins:
  - jekyll-seo-tag
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true
