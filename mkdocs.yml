# 构建前请运行: python scripts/prepare_mkdocs.py
# 该脚本会生成 docs/index.md 与 docs/assets/。
site_name: RentHub 开发者指南
site_description: RentHub 团队开发者参考手册（Markdown 文档站）
site_url: https://docs.renthub.cloud/renthub-developer-guide/

repo_name: renthub-developer-guide

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式

docs_dir: docs

hooks:
  - hooks/mkdocs_hooks.py

nav:
  - 首页: index.md
  - Vibe Coding:
      - 索引: vibe-coding/README.md
      - Cursor 使用指南: vibe-coding/cursor-guide.md
      - Cursor 核心概念: vibe-coding/cursor-concepts.md
  - 项目管理:
      - 索引: project-mgmt/README.md
      - Git 基础入门: project-mgmt/git-basics.md
      - Git 协作工作流: project-mgmt/git-workflow.md

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
